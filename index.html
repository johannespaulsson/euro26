<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eurovision 2026 - Voting</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #5e35b1;
            --secondary: #ff0055;
            --accent: #ffd700;
            --dark: #0a0a0c;
            --card-bg: #1a1a1f;
            --text: #ffffff;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Montserrat', sans-serif;
            background-color: var(--dark);
            color: var(--text);
            line-height: 1.6;
            overflow-x: hidden;
        }

        /* Setup Screen */
        #setup-screen {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(135deg, #2e1a47 0%, #0a0a0c 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 3000;
            padding: 20px;
        }

        .setup-content {
            background: var(--card-bg);
            padding: 40px 30px;
            border-radius: 24px;
            text-align: center;
            box-shadow: 0 20px 40px rgba(0,0,0,0.6);
            max-width: 400px;
            width: 100%;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .setup-content h2 {
            font-size: 2rem;
            font-weight: 800;
            margin-bottom: 10px;
            background: linear-gradient(to right, #fff, var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .setup-content input {
            width: 100%;
            padding: 15px;
            border-radius: 12px;
            border: 2px solid rgba(255,255,255,0.1);
            margin: 20px 0;
            background: #000;
            color: white;
            font-size: 1.1rem;
            outline: none;
            transition: border-color 0.3s;
        }

        .setup-content input:focus {
            border-color: var(--primary);
        }

        /* Voting Screen */
        header {
            background: linear-gradient(180deg, rgba(94, 53, 177, 0.3) 0%, transparent 100%);
            padding: 40px 20px;
            text-align: center;
        }

        header h1 {
            font-size: 2.2rem;
            font-weight: 800;
            letter-spacing: -1px;
            margin-bottom: 5px;
        }

        #active-users {
            display: flex;
            justify-content: center;
            gap: 10px;
            flex-wrap: wrap;
            margin-top: 15px;
            min-height: 30px;
        }

        .user-pill {
            background: rgba(255, 255, 255, 0.1);
            padding: 4px 12px;
            border-radius: 15px;
            font-size: 0.8rem;
            font-weight: 600;
            border: 1px solid rgba(255, 255, 255, 0.2);
            animation: fadeIn 0.5s ease forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(5px); }
            to { opacity: 1; transform: translateY(0); }
        }

        #points-left {
            background: rgba(255,255,255,0.1);
            display: inline-block;
            padding: 6px 15px;
            border-radius: 20px;
            font-size: 0.9rem;
            font-weight: 600;
            color: var(--accent);
            margin-top: 10px;
        }

        .container {
            max-width: 1100px;
            margin: 0 auto;
            padding: 20px;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 20px;
        }

        /* Cards */
        .card {
            background: var(--card-bg);
            border-radius: 20px;
            padding: 20px;
            text-align: center;
            position: relative;
            border: 1px solid rgba(255,255,255,0.05);
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            cursor: pointer;
        }

        .card:hover {
            transform: scale(1.05);
            background: #25252b;
            border-color: var(--primary);
        }

        .flag {
            font-size: 3.5rem;
            display: block;
            margin-bottom: 10px;
            filter: drop-shadow(0 5px 10px rgba(0,0,0,0.3));
        }

        .country-name {
            font-weight: 600;
            font-size: 1rem;
            margin-bottom: 15px;
            display: block;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .points-badge {
            position: absolute;
            top: -10px;
            right: -10px;
            background: var(--accent);
            color: #000;
            padding: 5px 12px;
            border-radius: 12px;
            font-weight: 800;
            font-size: 0.9rem;
            box-shadow: 0 5px 15px rgba(0,0,0,0.4);
            display: none;
            z-index: 10;
        }

        .vote-btn {
            background: var(--primary);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 12px;
            font-weight: 700;
            width: 100%;
            cursor: pointer;
            transition: background 0.2s;
        }

        /* Points Overlay */
        .points-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9);
            z-index: 4000;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .points-modal {
            background: var(--card-bg);
            padding: 30px;
            border-radius: 24px;
            width: 100%;
            max-width: 500px;
            text-align: center;
        }

        .points-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 10px;
            margin-top: 20px;
        }

        .point-btn {
            background: #333;
            border: none;
            color: white;
            padding: 15px 5px;
            border-radius: 12px;
            font-weight: 800;
            font-size: 1.1rem;
            cursor: pointer;
            transition: all 0.2s;
        }

        .point-btn:hover:not(:disabled) {
            background: var(--primary);
            transform: translateY(-2px);
        }

        .point-btn:disabled {
            opacity: 0.2;
            cursor: not-allowed;
        }

        /* Admin & Misc */
        #admin-trigger {
            position: fixed; bottom: 20px; right: 20px;
            opacity: 0.3; background: none; border: none; color: white; cursor: pointer;
        }

        #admin-panel {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--dark); z-index: 5000; padding: 40px 20px; overflow-y: auto;
        }

        .result-item {
            display: flex; align-items: center; margin-bottom: 15px; background: rgba(255,255,255,0.05);
            padding: 15px; border-radius: 15px;
        }

        .bar-container { flex-grow: 1; margin: 0 15px; height: 8px; background: #333; border-radius: 4px; overflow: hidden; }
        .bar { height: 100%; background: var(--accent); transition: width 1s ease; }

        .toast {
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
            background: var(--accent); color: #000; padding: 12px 25px; border-radius: 30px;
            font-weight: 700; opacity: 0; transition: opacity 0.3s; z-index: 6000;
        }

        @media (max-width: 480px) {
            .grid { grid-template-columns: repeat(2, 1fr); }
            .points-grid { grid-template-columns: repeat(4, 1fr); }
        }
    </style>
</head>
<body>

    <div id="setup-screen">
        <div class="setup-content">
            <h2>Eurovision 2026</h2>
            <p>Who wins in Vienna? Enter your name to start voting.</p>
            <input type="text" id="user-name" placeholder="Your name..." autofocus>
            <button onclick="startVoting()" class="vote-btn">Join the Party!</button>
        </div>
    </div>

    <div id="voting-screen" style="display: none;">
        <header>
            <h1 id="welcome-msg">Eurovision 2026</h1>
            <div id="active-users"></div>
            <p id="points-left">Loading points...</p>
        </header>

        <div class="container">
            <div class="grid" id="country-grid"></div>
        </div>
    </div>

    <div id="points-overlay" class="points-overlay">
        <div class="points-modal">
            <h3 id="modal-title">Give points to...</h3>
            <div class="points-grid" id="points-grid"></div>
            <button onclick="closeOverlay()" class="vote-btn" style="margin-top: 20px; background: #444;">Cancel</button>
        </div>
    </div>

    <button id="admin-trigger" onclick="openAdmin()">Admin</button>

    <div id="admin-panel">
        <div class="container" style="max-width: 600px;">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px;">
                <h2>Live Results</h2>
                <button onclick="closeAdmin()" class="vote-btn" style="width: auto;">Close</button>
            </div>
            <div id="results-list"></div>
        </div>
    </div>

    <div id="toast" class="toast"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, runTransaction, onValue, set, push, onDisconnect } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        // --- DIN FIREBASE KONFIGURATION ---
        const firebaseConfig = {
            apiKey: "AIzaSyAxDy6JBpEJaRTYOJs03nwUAdUHdghRn10",
            authDomain: "eurovision-f26b6.firebaseapp.com",
            databaseURL: "https://eurovision-f26b6-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "eurovision-f26b6",
            storageBucket: "eurovision-f26b6.firebasestorage.app",
            messagingSenderId: "792172036315",
            appId: "1:792172036315:web:a3c5ddaf8ebe1a077c4cfe",
            measurementId: "G-ST4DG1WH5T"
        };

        console.log("Ansluter till Firebase...");
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        console.log("Firebase initierad! Database URL:", firebaseConfig.databaseURL);

        // Testanslutning
        onValue(ref(db, '.info/connected'), (snap) => {
            if (snap.val() === true) {
                console.log("Ansluten till Firebase Realtime Database!");
            } else {
                console.warn("Ej ansluten till Firebase (offline eller blockerat).");
            }
        });

        // Lyssna på aktiva användare
        onValue(ref(db, 'users'), (snap) => {
            const users = snap.val() || {};
            const container = document.getElementById('active-users');
            container.innerHTML = '';
            Object.values(users).forEach(name => {
                const pill = document.createElement('span');
                pill.className = 'user-pill';
                pill.textContent = `👤 ${name}`;
                container.appendChild(pill);
            });
        });

        const countries = [
            { id: "AL", name: "Albania", flag: "🇦🇱" }, { id: "AM", name: "Armenia", flag: "🇦🇲" },
            { id: "AU", name: "Australia", flag: "🇦🇺" }, { id: "AT", name: "Austria", flag: "🇦🇹" },
            { id: "AZ", name: "Azerbaijan", flag: "🇦🇿" }, { id: "BE", name: "Belgium", flag: "🇧🇪" },
            { id: "BG", name: "Bulgaria", flag: "🇧🇬" }, { id: "HR", name: "Croatia", flag: "🇭🇷" },
            { id: "CY", name: "Cyprus", flag: "🇨🇾" }, { id: "CZ", name: "Czech Republic", flag: "🇨🇿" },
            { id: "DK", name: "Denmark", flag: "🇩🇰" }, { id: "EE", name: "Estonia", flag: "🇪🇪" },
            { id: "FI", name: "Finland", flag: "🇫🇮" }, { id: "FR", name: "France", flag: "🇫🇷" },
            { id: "GE", name: "Georgia", flag: "🇬🇪" }, { id: "DE", name: "Germany", flag: "🇩🇪" },
            { id: "GR", name: "Greece", flag: "🇬🇷" }, { id: "IL", name: "Israel", flag: "🇮🇱" },
            { id: "IT", name: "Italy", flag: "🇮🇹" }, { id: "LV", name: "Latvia", flag: "🇱🇻" },
            { id: "LT", name: "Lithuania", flag: "🇱🇹" }, { id: "LU", name: "Luxembourg", flag: "🇱🇺" },
            { id: "MT", name: "Malta", flag: "🇲🇹" }, { id: "MD", name: "Moldova", flag: "🇲🇩" },
            { id: "ME", name: "Montenegro", flag: "🇲🇪" }, { id: "NO", name: "Norway", flag: "🇳🇴" },
            { id: "PL", name: "Poland", flag: "🇵🇱" }, { id: "PT", name: "Portugal", flag: "🇵🇹" },
            { id: "RO", name: "Romania", flag: "🇷🇴" }, { id: "SM", name: "San Marino", flag: "🇸🇲" },
            { id: "RS", name: "Serbia", flag: "🇷🇸" }, { id: "SE", name: "Sweden", flag: "🇸🇪" },
            { id: "CH", name: "Switzerland", flag: "🇨🇭" }, { id: "UA", name: "Ukraine", flag: "🇺🇦" },
            { id: "GB", name: "United Kingdom", flag: "🇬🇧" }
        ];

        let userName = localStorage.getItem('eurovision_name') || "";
        let availablePoints = [1, 2, 3, 4, 5, 6, 7, 8, 10, 12];
        let myVotes = JSON.parse(localStorage.getItem('eurovision_votes')) || {};
        let selectedCountry = null;

        // Calculate available points based on saved votes
        Object.values(myVotes).forEach(p => {
            availablePoints = availablePoints.filter(val => val !== p);
        });

        window.onload = function() {
            if (userName) {
                restoreSession();
            }
        };

        function restoreSession() {
            document.getElementById('setup-screen').style.display = 'none';
            document.getElementById('voting-screen').style.display = 'block';
            document.getElementById('welcome-msg').textContent = `Welcome back, ${userName}!`;
            
            // Update presence in Firebase
            const userRef = push(ref(db, 'users'));
            set(userRef, userName);
            onDisconnect(userRef).remove();

            updatePointsHeader();
            window.renderCountries();
        }

        window.startVoting = function() {
            const input = document.getElementById('user-name');
            userName = input.value.trim();
            if (userName.length < 2) return alert("Please enter your name!");
            
            localStorage.setItem('eurovision_name', userName);
            
            // Save user to Firebase and remove on disconnect
            const userRef = push(ref(db, 'users'));
            set(userRef, userName);
            onDisconnect(userRef).remove();

            document.getElementById('setup-screen').style.display = 'none';
            document.getElementById('voting-screen').style.display = 'block';
            document.getElementById('welcome-msg').textContent = `Go ${userName}!`;
            updatePointsHeader();
            window.renderCountries();
        };

        window.renderCountries = function() {
            const grid = document.getElementById('country-grid');
            grid.innerHTML = '';
            countries.forEach(c => {
                const card = document.createElement('div');
                card.className = 'card';
                const hasVoted = myVotes[c.id];
                card.innerHTML = `
                    <span class="points-badge" id="badge-${c.id}">${hasVoted || ''}p</span>
                    <span class="flag">${c.flag}</span>
                    <span class="country-name">${c.name}</span>
                    ${hasVoted 
                        ? `<button class="vote-btn" style="background: #444; margin-top: 5px;" onclick="event.stopPropagation(); window.removeVote('${c.id}')">Remove</button>` 
                        : `<button class="vote-btn">Give points</button>`}
                `;
                if (hasVoted) {
                    card.querySelector('.points-badge').style.display = 'block';
                    card.style.borderColor = 'var(--accent)';
                }
                card.onclick = () => { if (!myVotes[c.id]) window.openPoints(c.id); };
                grid.appendChild(card);
            });
        }

        window.removeVote = function(cid) {
            const p = myVotes[cid];
            if (!p) return;

            console.log(`Removing vote: ${p} points from ${cid}`);
            const voteRef = ref(db, 'votes/' + cid);
            
            runTransaction(voteRef, (curr) => {
                if (curr === null) return 0;
                return Math.max(0, curr - p);
            }).then(() => {
                delete myVotes[cid];
                localStorage.setItem('eurovision_votes', JSON.stringify(myVotes));
                availablePoints.push(p);
                availablePoints.sort((a, b) => a - b);
                
                window.renderCountries();
                updatePointsHeader();
                showToast(`Removed ${p} points from ${countries.find(c => c.id === cid).name}`);
            }).catch(err => {
                console.error("Firebase error during removal:", err);
                alert("Could not remove vote: " + err.message);
            });
        }

        window.openPoints = function(id) {
            selectedCountry = id;
            const country = countries.find(c => c.id === id);
            document.getElementById('modal-title').textContent = `How many points to ${country.name}?`;
            const pGrid = document.getElementById('points-grid');
            pGrid.innerHTML = '';
            [1, 2, 3, 4, 5, 6, 7, 8, 10, 12].forEach(p => {
                const btn = document.createElement('button');
                btn.className = 'point-btn';
                btn.textContent = p;
                if (!availablePoints.includes(p)) btn.disabled = true;
                btn.onclick = (e) => {
                    e.stopPropagation();
                    window.submitVote(p);
                };
                pGrid.appendChild(btn);
            });
            document.getElementById('points-overlay').style.display = 'flex';
        }

        window.closeOverlay = () => document.getElementById('points-overlay').style.display = 'none';

        window.submitVote = function(p) {
            const cid = selectedCountry;
            console.log(`Trying to vote: ${p} points to ${cid}`);
            const voteRef = ref(db, 'votes/' + cid);
            runTransaction(voteRef, (curr) => (curr || 0) + p).then(() => {
                myVotes[cid] = p;
                localStorage.setItem('eurovision_votes', JSON.stringify(myVotes));
                availablePoints = availablePoints.filter(val => val !== p);
                window.closeOverlay();
                window.renderCountries();
                updatePointsHeader();
                showToast(`Gave ${p} points to ${countries.find(c => c.id === cid).name}!`);
            }).catch(err => {
                console.error("Firebase error during voting:", err);
                if (err.message.includes("permission_denied")) {
                    alert("Access denied! You must change 'Rules' in Firebase Console to public (read/write: true).");
                } else {
                    alert("Could not save vote: " + err.message);
                }
            });
        }

        function updatePointsHeader() {
            const el = document.getElementById('points-left');
            if (availablePoints.length === 0) {
                el.textContent = "All points assigned!";
                el.style.color = "#4caf50";
            } else {
                el.textContent = "Points left: " + availablePoints.join(", ");
            }
        }

        window.openAdmin = () => {
            const pass = prompt("Passcode:");
            if (pass === "stek1337") {
                document.getElementById('admin-panel').style.display = 'block';
                console.log("Admin opened, fetching data...");
                onValue(ref(db, 'votes'), (snap) => {
                    const data = snap.val() || {};
                    console.log("Data received for admin:", data);
                    renderResults(data);
                }, (err) => {
                    console.error("Admin onValue error:", err);
                });
            } else if (pass !== null) {
                alert("Wrong passcode!");
            }
        };

        window.closeAdmin = () => document.getElementById('admin-panel').style.display = 'none';

        function renderResults(votes) {
            const list = document.getElementById('results-list');
            list.innerHTML = '';
            const sorted = countries.map(c => ({...c, score: votes[c.id] || 0})).sort((a,b) => b.score - a.score);
            
            if (sorted.every(s => s.score === 0)) {
                list.innerHTML = '<p style="text-align:center; padding: 20px; opacity: 0.5;">No votes received yet.</p>';
                return;
            }

            const max = Math.max(...sorted.map(s => s.score), 1);
            sorted.forEach((item, i) => {
                const row = document.createElement('div');
                row.className = 'result-item';
                row.innerHTML = `
                    <span style="width: 30px; font-weight: 800;">${i+1}</span>
                    <span style="width: 120px">${item.flag} ${item.name}</span>
                    <div class="bar-container"><div class="bar" style="width: ${(item.score/max)*100}%"></div></div>
                    <span style="font-weight: 800; min-width: 40px; text-align: right;">${item.score}p</span>
                `;
                list.appendChild(row);
            });
        }

        function showToast(m) {
            const t = document.getElementById('toast');
            t.textContent = m; t.style.opacity = 1;
            setTimeout(() => t.style.opacity = 0, 3000);
        }
    </script>
</body>
</html>
