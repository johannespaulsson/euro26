<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eurovision 2026 - Voting</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #5e35b1;
            --secondary: #ff0055;
            --accent: #ffd700;
            --dark: #0a0a0c;
            --card-bg: #1a1a1f;
            --text: #ffffff;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Montserrat', sans-serif;
            background-color: var(--dark);
            color: var(--text);
            line-height: 1.6;
            overflow-x: hidden;
        }

        /* Setup Screen */
        #setup-screen {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(135deg, #2e1a47 0%, #0a0a0c 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 3000;
            padding: 20px;
        }

        .setup-content {
            background: var(--card-bg);
            padding: 40px 30px;
            border-radius: 24px;
            text-align: center;
            box-shadow: 0 20px 40px rgba(0,0,0,0.6);
            max-width: 400px;
            width: 100%;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .setup-content h2 {
            font-size: 2rem;
            font-weight: 800;
            margin-bottom: 10px;
            background: linear-gradient(to right, #fff, var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .setup-content input {
            width: 100%;
            padding: 15px;
            border-radius: 12px;
            border: 2px solid rgba(255,255,255,0.1);
            margin: 20px 0;
            background: #000;
            color: white;
            font-size: 1.1rem;
            outline: none;
            transition: border-color 0.3s;
        }

        .setup-content input:focus {
            border-color: var(--primary);
        }

        /* Voting Screen */
        header {
            background: linear-gradient(180deg, rgba(94, 53, 177, 0.3) 0%, transparent 100%);
            padding: 40px 20px;
            text-align: center;
        }

        header h1 {
            font-size: 2.2rem;
            font-weight: 800;
            letter-spacing: -1px;
            margin-bottom: 5px;
        }

        #active-users {
            display: flex;
            justify-content: center;
            gap: 10px;
            flex-wrap: wrap;
            margin-top: 15px;
            min-height: 30px;
        }

        /* Leaderboard Styling */
        #top-leaderboard {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 25px;
            perspective: 1000px;
        }

        .top-spot {
            background: rgba(255, 255, 255, 0.05);
            padding: 15px;
            border-radius: 15px;
            text-align: center;
            min-width: 100px;
            border: 1px solid rgba(255,255,255,0.1);
            position: relative;
            transition: transform 0.3s;
        }

        .top-spot:nth-child(2) { transform: scale(1.15); border-color: var(--accent); background: rgba(255, 215, 0, 0.1); } /* Gold */
        .top-spot:nth-child(1) { margin-top: 10px; } /* Silver */
        .top-spot:nth-child(3) { margin-top: 10px; } /* Bronze */

        .spot-rank {
            position: absolute;
            top: -10px;
            left: 50%;
            transform: translateX(-50%);
            background: #333;
            width: 24px;
            height: 24px;
            border-radius: 50%;
            font-size: 0.8rem;
            font-weight: 800;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .top-spot:nth-child(2) .spot-rank { background: var(--accent); color: #000; }

        .spot-flag { font-size: 2rem; display: block; }
        .spot-name { font-size: 0.8rem; font-weight: 700; display: block; margin: 5px 0; }
        .spot-points { font-size: 1.1rem; font-weight: 800; color: var(--accent); }

        .user-pill {
            background: rgba(255, 255, 255, 0.1);
            padding: 4px 12px;
            border-radius: 15px;
            font-size: 0.8rem;
            font-weight: 600;
            border: 1px solid rgba(255, 255, 255, 0.2);
            animation: fadeIn 0.5s ease forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(5px); }
            to { opacity: 1; transform: translateY(0); }
        }

        #points-left {
            background: rgba(255,255,255,0.1);
            display: inline-block;
            padding: 6px 15px;
            border-radius: 20px;
            font-size: 0.9rem;
            font-weight: 600;
            color: var(--accent);
            margin-top: 10px;
        }

        .container {
            max-width: 1100px;
            margin: 0 auto;
            padding: 20px;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 20px;
        }

        /* Cards */
        .card {
            background: var(--card-bg);
            border-radius: 20px;
            padding: 20px;
            text-align: center;
            position: relative;
            border: 1px solid rgba(255,255,255,0.05);
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            cursor: pointer;
        }

        .card:hover {
            transform: scale(1.05);
            background: #25252b;
            border-color: var(--primary);
        }

        .flag {
            font-size: 3.5rem;
            display: block;
            margin-bottom: 10px;
            filter: drop-shadow(0 5px 10px rgba(0,0,0,0.3));
        }

        .country-name {
            font-weight: 600;
            font-size: 1rem;
            margin-bottom: 15px;
            display: block;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .points-badge {
            position: absolute;
            top: -10px;
            right: -10px;
            background: var(--accent);
            color: #000;
            padding: 5px 12px;
            border-radius: 12px;
            font-weight: 800;
            font-size: 0.9rem;
            box-shadow: 0 5px 15px rgba(0,0,0,0.4);
            display: none;
            z-index: 10;
        }

        .vote-btn {
            background: var(--primary);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 12px;
            font-weight: 700;
            width: 100%;
            cursor: pointer;
            transition: background 0.2s;
        }

        /* Points Overlay */
        .points-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9);
            z-index: 4000;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .points-modal {
            background: var(--card-bg);
            padding: 30px;
            border-radius: 24px;
            width: 100%;
            max-width: 500px;
            text-align: center;
        }

        .points-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 10px;
            margin-top: 20px;
        }

        .point-btn {
            background: #333;
            border: none;
            color: white;
            padding: 15px 5px;
            border-radius: 12px;
            font-weight: 800;
            font-size: 1.1rem;
            cursor: pointer;
            transition: all 0.2s;
        }

        .point-btn:hover:not(:disabled) {
            background: var(--primary);
            transform: translateY(-2px);
        }

        .point-btn:disabled {
            opacity: 0.2;
            cursor: not-allowed;
        }

        /* Admin & Misc */
        #admin-trigger {
            position: fixed; bottom: 20px; right: 20px;
            opacity: 0.3; background: none; border: none; color: white; cursor: pointer;
        }

        #admin-panel {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--dark); z-index: 5000; padding: 40px 20px; overflow-y: auto;
        }

        .result-item {
            display: flex; align-items: center; margin-bottom: 15px; background: rgba(255,255,255,0.05);
            padding: 15px; border-radius: 15px;
        }

        .bar-container { flex-grow: 1; margin: 0 15px; height: 8px; background: #333; border-radius: 4px; overflow: hidden; }
        .bar { height: 100%; background: var(--accent); transition: width 1s ease; }

        .toast {
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
            background: var(--accent); color: #000; padding: 12px 25px; border-radius: 30px;
            font-weight: 700; opacity: 0; transition: opacity 0.3s; z-index: 6000;
        }

        @media (max-width: 480px) {
            .grid { grid-template-columns: repeat(2, 1fr); }
            .points-grid { grid-template-columns: repeat(4, 1fr); }
        }
    </style>
</head>
<body>

    <div id="setup-screen">
        <div class="setup-content">
            <h2>Eurovision 2026</h2>
            <p>Who wins in Vienna? Enter your name to start voting.</p>
            <input type="text" id="user-name" placeholder="Your name..." autofocus>
            <button onclick="startVoting()" class="vote-btn">Join the Party!</button>
        </div>
    </div>

    <div id="voting-screen" style="display: none;">
        <header>
            <div style="display: flex; justify-content: space-between; align-items: center; max-width: 1100px; margin: 0 auto;">
                <h1 id="welcome-msg" style="margin: 0; text-align: left;">Eurovision 2026</h1>
                <button onclick="window.logout()" style="background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); color: white; padding: 8px 15px; border-radius: 12px; cursor: pointer; font-weight: 600; font-size: 0.8rem;">Log Out</button>
            </div>
            
            <div id="top-leaderboard" style="margin-top: 20px;"></div>

            <div id="active-users"></div>
            <p id="points-left">Loading points...</p>
        </header>

        <div class="container">
            <div class="grid" id="country-grid"></div>
        </div>
    </div>

    <div id="points-overlay" class="points-overlay">
        <div class="points-modal">
            <h3 id="modal-title">Give points to...</h3>
            <div class="points-grid" id="points-grid"></div>
            <button onclick="closeOverlay()" class="vote-btn" style="margin-top: 20px; background: #444;">Cancel</button>
        </div>
    </div>

    <button id="admin-trigger" onclick="openAdmin()">Admin</button>

    <div id="admin-panel">
        <div class="container" style="max-width: 800px;">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px;">
                <h2>Admin Dashboard</h2>
                <button onclick="closeAdmin()" class="vote-btn" style="width: auto;">Close</button>
            </div>
            
            <div id="admin-tabs" style="display: flex; gap: 10px; margin-bottom: 20px;">
                <button onclick="showAdminTab('standings')" class="vote-btn" style="background: #333;">Standings</button>
                <button onclick="showAdminTab('users-list')" class="vote-btn" style="background: #333;">Users & Votes</button>
            </div>

            <div id="admin-standings">
                <h3>Live Standings</h3>
                <div id="results-list"></div>
            </div>

            <div id="admin-users-list" style="display: none;">
                <h3>User Activity</h3>
                <div id="users-detail-list"></div>
            </div>
        </div>
    </div>

    <div id="toast" class="toast"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, runTransaction, onValue, set, push, onDisconnect } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        // --- DIN FIREBASE KONFIGURATION ---
        const firebaseConfig = {
            apiKey: "AIzaSyAxDy6JBpEJaRTYOJs03nwUAdUHdghRn10",
            authDomain: "eurovision-f26b6.firebaseapp.com",
            databaseURL: "https://eurovision-f26b6-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "eurovision-f26b6",
            storageBucket: "eurovision-f26b6.firebasestorage.app",
            messagingSenderId: "792172036315",
            appId: "1:792172036315:web:a3c5ddaf8ebe1a077c4cfe",
            measurementId: "G-ST4DG1WH5T"
        };

        console.log("Ansluter till Firebase...");
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        console.log("Firebase initierad! Database URL:", firebaseConfig.databaseURL);

        // Testanslutning
        onValue(ref(db, '.info/connected'), (snap) => {
            if (snap.val() === true) {
                console.log("Ansluten till Firebase Realtime Database!");
            } else {
                console.warn("Ej ansluten till Firebase (offline eller blockerat).");
            }
        });

        // Listen for active users
        onValue(ref(db, 'users'), (snap) => {
            const users = snap.val() || {};
            const container = document.getElementById('active-users');
            container.innerHTML = '';
            Object.values(users).forEach(name => {
                const pill = document.createElement('span');
                pill.className = 'user-pill';
                pill.textContent = `👤 ${name}`;
                container.appendChild(pill);
            });
        });

        // Listen for all votes to update Top 3 Leaderboard
        onValue(ref(db, 'votes'), (snap) => {
            const votes = snap.val() || {};
            const sorted = countries
                .map(c => ({...c, score: votes[c.id] || 0}))
                .sort((a,b) => b.score - a.score);
            
            const top3 = sorted.slice(0, 3);
            const container = document.getElementById('top-leaderboard');
            
            if (top3.every(c => c.score === 0)) {
                container.innerHTML = '';
                return;
            }

            // Reorder to 2nd, 1st, 3rd for podium layout
            const podium = [top3[1], top3[0], top3[2]];
            container.innerHTML = '';
            podium.forEach((c, i) => {
                if (!c) return;
                const spot = document.createElement('div');
                spot.className = 'top-spot';
                const rank = i === 0 ? 2 : (i === 1 ? 1 : 3);
                spot.innerHTML = `
                    <div class="spot-rank">${rank}</div>
                    <span class="spot-flag">${c.flag}</span>
                    <span class="spot-name">${c.name}</span>
                    <span class="spot-points">${c.score}p</span>
                `;
                container.appendChild(spot);
            });
        });

        const countries = [
            { id: "AL", name: "Albania", flag: "🇦🇱", artist: "Besa", song: "Titan" },
            { id: "AM", name: "Armenia", flag: "🇦🇲", artist: "Ladaniva", song: "Jako" },
            { id: "AU", name: "Australia", flag: "🇦🇺", artist: "Electric Fields", song: "One Milkali" },
            { id: "AT", name: "Austria", flag: "🇦🇹", artist: "Kaleen", song: "We Will Rave" },
            { id: "AZ", name: "Azerbaijan", flag: "🇦🇿", artist: "Fahree", song: "Özünlə Apar" },
            { id: "BE", name: "Belgium", flag: "🇧🇪", artist: "Mustii", song: "Before the Party's Over" },
            { id: "HR", name: "Croatia", flag: "🇭🇷", artist: "Baby Lasagna", song: "Rim Tim Tagi Dim" },
            { id: "CY", name: "Cyprus", flag: "🇨🇾", artist: "Silia Kapsis", song: "Liar" },
            { id: "CZ", name: "Czechia", flag: "🇨🇿", artist: "Aiko", song: "Pedestal" },
            { id: "DK", name: "Denmark", flag: "🇩🇰", artist: "Saba", song: "Sand" },
            { id: "EE", name: "Estonia", flag: "🇪🇪", artist: "5miinust & Puuluup", song: "(nendest) narkootikumidest..." },
            { id: "FI", name: "Finland", flag: "🇫🇮", artist: "Windows95man", song: "No Rules!" },
            { id: "FR", name: "France", flag: "🇫🇷", artist: "Slimane", song: "Mon Amour" },
            { id: "GE", name: "Georgia", flag: "🇬🇪", artist: "Nutsa Buzaladze", song: "Firefighter" },
            { id: "DE", name: "Germany", flag: "🇩🇪", artist: "Isaak", song: "Always on the Run" },
            { id: "GR", name: "Greece", flag: "🇬🇷", artist: "Marina Satti", song: "Zari" },
            { id: "IL", name: "Israel", flag: "🇮🇱", artist: "Eden Golan", song: "Hurricane" },
            { id: "IT", name: "Italy", flag: "🇮🇹", artist: "Angelina Mango", song: "La Noia" },
            { id: "LV", name: "Latvia", flag: "🇱🇻", artist: "Dons", song: "Hollow" },
            { id: "LT", name: "Lithuania", flag: "🇱🇹", artist: "Silvester Belt", song: "Luktelk" },
            { id: "LU", name: "Luxembourg", flag: "🇱🇺", artist: "Tali", song: "Fighter" },
            { id: "MT", name: "Malta", flag: "🇲🇹", artist: "Sarah Bonnici", song: "Loop" },
            { id: "MD", name: "Moldova", flag: "🇲🇩", artist: "Natalia Barbu", song: "In the Middle" },
            { id: "NO", name: "Norway", flag: "🇳🇴", artist: "Gåte", song: "Ulveham" },
            { id: "PL", name: "Poland", flag: "🇵🇱", artist: "Luna", song: "The Tower" },
            { id: "PT", name: "Portugal", flag: "🇵🇹", artist: "Iolanda", song: "Grito" },
            { id: "SM", name: "San Marino", flag: "🇸🇲", artist: "Megara", song: "11:11" },
            { id: "RS", name: "Serbia", flag: "🇷🇸", artist: "Teya Dora", song: "Ramonda" },
            { id: "SE", name: "Sweden", flag: "🇸🇪", artist: "Marcus & Martinus", song: "Unforgettable" },
            { id: "CH", name: "Switzerland", flag: "🇨🇭", artist: "Nemo", song: "The Code" },
            { id: "UA", name: "Ukraine", flag: "🇺🇦", artist: "Alyona Alyona & Jerry Heil", song: "Teresa & Maria" },
            { id: "GB", name: "United Kingdom", flag: "🇬🇧", artist: "Olly Alexander", song: "Dizzy" }
        ];

        let userName = localStorage.getItem('eurovision_name') || "";
        let availablePoints = [1, 2, 3, 4, 5, 6, 7, 8, 10, 12];
        let myVotes = JSON.parse(localStorage.getItem('eurovision_votes')) || {};
        let selectedCountry = null;

        // Calculate available points based on saved votes
        Object.values(myVotes).forEach(p => {
            availablePoints = availablePoints.filter(val => val !== p);
        });

        window.onload = function() {
            if (userName) {
                restoreSession();
            }
        };

        window.restoreSession = function() {
            const uid = localStorage.getItem('eurovision_uid');
            document.getElementById('setup-screen').style.display = 'none';
            document.getElementById('voting-screen').style.display = 'block';
            document.getElementById('welcome-msg').textContent = `Welcome back, ${userName}!`;
            
            if (uid) {
                const userRef = ref(db, `users/${uid}`);
                set(userRef, userName);
                onDisconnect(userRef).remove();
            }

            updatePointsHeader();
            window.renderCountries();
        }

        window.startVoting = function() {
            const input = document.getElementById('user-name');
            const name = input.value.trim();
            if (name.length < 2) return alert("Please enter your name!");
            
            // Check if user already exists in database (to restore session by name)
            onValue(ref(db, 'user_votes'), (snap) => {
                const allUserVotes = snap.val() || {};
                let foundUid = null;
                let foundVotes = {};

                for (const [uid, data] of Object.entries(allUserVotes)) {
                    if (data.name && data.name.toLowerCase() === name.toLowerCase()) {
                        foundUid = uid;
                        foundVotes = data.votes || {};
                        break;
                    }
                }

                let currentUid;
                if (foundUid) {
                    // Restore existing session
                    currentUid = foundUid;
                    myVotes = foundVotes;
                    showToast("Welcome back! Restoring your votes...");
                } else {
                    // Create new session
                    currentUid = 'u' + Date.now();
                    myVotes = {};
                    set(ref(db, `user_votes/${currentUid}/name`), name);
                }

                // Update Local Storage
                localStorage.setItem('eurovision_uid', currentUid);
                localStorage.setItem('eurovision_name', name);
                localStorage.setItem('eurovision_votes', JSON.stringify(myVotes));
                
                userName = name;
                
                // Recalculate available points
                availablePoints = [1, 2, 3, 4, 5, 6, 7, 8, 10, 12];
                Object.values(myVotes).forEach(p => {
                    availablePoints = availablePoints.filter(val => val !== p);
                });

                // Active user presence
                const userRef = ref(db, `users/${currentUid}`);
                set(userRef, name);
                onDisconnect(userRef).remove();

                document.getElementById('setup-screen').style.display = 'none';
                document.getElementById('voting-screen').style.display = 'block';
                document.getElementById('welcome-msg').textContent = `Go ${name}!`;
                updatePointsHeader();
                window.renderCountries();
            }, { onlyOnce: true });
        };

        window.logout = function() {
            if (!confirm("Are you sure you want to log out? Your votes will remain in the database.")) return;
            
            const uid = localStorage.getItem('eurovision_uid');
            if (uid) {
                set(ref(db, `users/${uid}`), null);
            }

            localStorage.removeItem('eurovision_name');
            localStorage.removeItem('eurovision_votes');
            localStorage.removeItem('eurovision_uid');

            userName = "";
            myVotes = {};
            availablePoints = [1, 2, 3, 4, 5, 6, 7, 8, 10, 12];

            document.getElementById('voting-screen').style.display = 'none';
            document.getElementById('setup-screen').style.display = 'flex';
            document.getElementById('user-name').value = '';
            
            showToast("Logged out successfully.");
        };

        window.renderCountries = function() {
            const grid = document.getElementById('country-grid');
            grid.innerHTML = '';
            countries.forEach(c => {
                const card = document.createElement('div');
                card.className = 'card';
                const hasVoted = myVotes[c.id];
                card.innerHTML = `
                    <span class="points-badge" id="badge-${c.id}">${hasVoted || ''}p</span>
                    <span class="flag">${c.flag}</span>
                    <span class="country-name">${c.name}</span>
                    <span style="font-size: 0.75rem; opacity: 0.7; display: block; margin-bottom: 10px;">${c.artist} - "${c.song}"</span>
                    ${hasVoted 
                        ? `<button class="vote-btn" style="background: #444; margin-top: 5px;" onclick="event.stopPropagation(); window.removeVote('${c.id}')">Remove</button>` 
                        : `<button class="vote-btn">Give points</button>`}
                `;
                if (hasVoted) {
                    card.querySelector('.points-badge').style.display = 'block';
                    card.style.borderColor = 'var(--accent)';
                }
                card.onclick = () => { if (!myVotes[c.id]) window.openPoints(c.id); };
                grid.appendChild(card);
            });
        }

        window.openPoints = function(id) {
            selectedCountry = id;
            const country = countries.find(c => c.id === id);
            document.getElementById('modal-title').innerHTML = `How many points to ${country.name}?<br><small style="font-weight: 400; opacity: 0.7;">${country.artist} - "${country.song}"</small>`;
            const pGrid = document.getElementById('points-grid');
            pGrid.innerHTML = '';
            [1, 2, 3, 4, 5, 6, 7, 8, 10, 12].forEach(p => {
                const btn = document.createElement('button');
                btn.className = 'point-btn';
                btn.textContent = p;
                if (!availablePoints.includes(p)) btn.disabled = true;
                btn.onclick = (e) => {
                    e.stopPropagation();
                    window.submitVote(p);
                };
                pGrid.appendChild(btn);
            });
            document.getElementById('points-overlay').style.display = 'flex';
        }

        window.closeOverlay = () => document.getElementById('points-overlay').style.display = 'none';

        window.submitVote = function(p) {
            const cid = selectedCountry;
            const uid = localStorage.getItem('eurovision_uid');
            
            // Track total standings
            const totalVoteRef = ref(db, 'votes/' + cid);
            runTransaction(totalVoteRef, (curr) => (curr || 0) + p);

            // Track individual user vote
            const userVoteRef = ref(db, `user_votes/${uid}/votes/${cid}`);
            set(userVoteRef, p).then(() => {
                myVotes[cid] = p;
                localStorage.setItem('eurovision_votes', JSON.stringify(myVotes));
                availablePoints = availablePoints.filter(val => val !== p);
                window.closeOverlay();
                window.renderCountries();
                updatePointsHeader();
                showToast(`Gave ${p} points to ${countries.find(c => c.id === cid).name}!`);
            });
        }

        function updatePointsHeader() {
            const el = document.getElementById('points-left');
            if (availablePoints.length === 0) {
                el.textContent = "All points assigned!";
                el.style.color = "#4caf50";
            } else {
                el.textContent = "Points left: " + availablePoints.join(", ");
            }
        }

        window.showAdminTab = function(tabId) {
            document.getElementById('admin-standings').style.display = tabId === 'standings' ? 'block' : 'none';
            document.getElementById('admin-users-list').style.display = tabId === 'users-list' ? 'block' : 'none';
        }

        window.openAdmin = () => {
            const pass = prompt("Passcode:");
            if (pass === "stek1337") {
                document.getElementById('admin-panel').style.display = 'block';
                
                // Standings listener
                onValue(ref(db, 'votes'), (snap) => {
                    const data = snap.val() || {};
                    renderResults(data);
                });

                // User details listener
                onValue(ref(db, 'user_votes'), (snap) => {
                    const data = snap.val() || {};
                    renderAdminUsers(data);
                });
            } else if (pass !== null) {
                alert("Wrong passcode!");
            }
        };

        window.closeAdmin = () => document.getElementById('admin-panel').style.display = 'none';

        function renderAdminUsers(userVotes) {
            const container = document.getElementById('users-detail-list');
            container.innerHTML = '';
            
            const entries = Object.entries(userVotes);
            if (entries.length === 0) {
                container.innerHTML = '<p style="text-align:center; padding: 20px; opacity: 0.5;">No user data found.</p>';
                return;
            }

            entries.forEach(([uid, userData]) => {
                const userBox = document.createElement('div');
                userBox.className = 'result-item';
                userBox.style.flexDirection = 'column';
                userBox.style.alignItems = 'flex-start';
                
                const votesText = Object.entries(userData.votes || {})
                    .map(([cid, p]) => `${countries.find(c => c.id === cid)?.flag || cid}: ${p}p`)
                    .join(', ') || 'No votes cast';

                userBox.innerHTML = `
                    <div style="display: flex; justify-content: space-between; width: 100%; margin-bottom: 10px;">
                        <span style="font-weight: 800; font-size: 1.1rem;">👤 ${userData.name}</span>
                        <button onclick="window.removeAdminUser('${uid}')" style="background: var(--secondary); border: none; color: white; padding: 5px 10px; border-radius: 8px; cursor: pointer; font-size: 0.8rem;">Delete User</button>
                    </div>
                    <div style="font-size: 0.85rem; opacity: 0.8; line-height: 1.4;">${votesText}</div>
                `;
                container.appendChild(userBox);
            });
        }

        window.removeAdminUser = async function(uid) {
            if (!confirm("Are you sure? This will delete the user and ALL their votes.")) return;
            
            try {
                // 1. Get user's votes first
                const userVotesRef = ref(db, `user_votes/${uid}/votes`);
                onValue(userVotesRef, async (snap) => {
                    const userVotes = snap.val() || {};
                    
                    // 2. Subtract each vote from total standings
                    for (const [cid, p] of Object.entries(userVotes)) {
                        const totalRef = ref(db, `votes/${cid}`);
                        await runTransaction(totalRef, (curr) => Math.max(0, (curr || 0) - p));
                    }

                    // 3. Delete user records
                    await set(ref(db, `user_votes/${uid}`), null);
                    await set(ref(db, `users/${uid}`), null);

                    showToast("User and votes removed.");
                }, { onlyOnce: true });
            } catch (err) {
                console.error("Delete failed:", err);
                alert("Error deleting user.");
            }
        }

        function renderResults(votes) {
            const list = document.getElementById('results-list');
            list.innerHTML = '';
            const sorted = countries.map(c => ({...c, score: votes[c.id] || 0})).sort((a,b) => b.score - a.score);
            
            if (sorted.every(s => s.score === 0)) {
                list.innerHTML = '<p style="text-align:center; padding: 20px; opacity: 0.5;">No votes received yet.</p>';
                return;
            }

            const max = Math.max(...sorted.map(s => s.score), 1);
            sorted.forEach((item, i) => {
                const row = document.createElement('div');
                row.className = 'result-item';
                row.innerHTML = `
                    <span style="width: 30px; font-weight: 800;">${i+1}</span>
                    <span style="width: 120px">${item.flag} ${item.name}</span>
                    <div class="bar-container"><div class="bar" style="width: ${(item.score/max)*100}%"></div></div>
                    <span style="font-weight: 800; min-width: 40px; text-align: right;">${item.score}p</span>
                `;
                list.appendChild(row);
            });
        }

        function showToast(m) {
            const t = document.getElementById('toast');
            t.textContent = m; t.style.opacity = 1;
            setTimeout(() => t.style.opacity = 0, 3000);
        }
    </script>
</body>
</html>
